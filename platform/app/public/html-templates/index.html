<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, shrink-to-fit=no, maximum-scale=1.0, user-scalable=no"
    />
    <meta
      name="theme-color"
      content="#000000"
    />
    <script type="text/javascript">
      console.time('scriptToView');
      window.PUBLIC_URL = '<%= PUBLIC_URL %>';
    </script>
    <!--
      Install metadata is intentionally omitted: branding is tenant-resolved at
      runtime, so a static manifest or platform icon would leak one tenant's identity.
    -->
    <link
      rel="icon"
      href="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNk+A8AAQUBAScY42YAAAAASUVORK5CYII="
    />

    <script
      rel="preload"
      as="script"
      type="text/javascript"
      src="<%= PUBLIC_URL %>app-config.js"
    ></script>
    <script
      rel="preload"
      as="script"
      type="module"
      src="<%= PUBLIC_URL %>init-service-worker.js"
    ></script>

    <title>Medical Imaging Viewer</title>

    <script>
      function browserImportFunction(moduleId) {
        return import(moduleId);
      }
    </script>

    <!-- EXTENSIONS -->
    <!-- <script type="text/javascript" src="path/to/some-extension.js"></script>

    <script>
      // If configuration file is a JS Object:
      window.config.extensions = [SomeExtension];

      // If configuration file is a JS Function:
      window.config = () => {
        return {
          extensions: [SomeExtension]
        };
      };
    </script> -->
  </head>

  <body>
    <noscript> You need to enable JavaScript to run this app. </noscript>
    <div id="react-portal"></div>
    <div id="root"></div>
  </body>
</html>
